<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #64748b; }
      .panel-title { font: 700 18px Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .value { font: 600 13px Arial, sans-serif; fill: #475569; }
      .hint { font: 400 12px Arial, sans-serif; fill: #94a3b8; }
      .year { font: 700 16px Arial, sans-serif; fill: #1e3a8a; }
    </style>
  </defs>

  <rect width="720" height="720" fill="#f8fafc"/>
  <text x="60" y="58" class="title">Historical return controls</text>
  <text x="60" y="84" class="subtitle">One real S&amp;P 500 period, locked to the investment horizon.</text>

  <g transform="translate(95 120)" filter="url(#shadow)">
    <rect width="530" height="520" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="28" y="42" class="panel-title">Control Panel</text>
    <line x1="28" y1="58" x2="502" y2="58" stroke="#e2e8f0"/>

    <text x="28" y="100" class="label">Investment Horizon</text>
    <text x="502" y="100" text-anchor="end" class="value">20 years</text>
    <line x1="28" y1="126" x2="502" y2="126" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <line x1="28" y1="126" x2="222" y2="126" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="222" cy="126" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>

    <text x="28" y="190" class="label">Historical Period</text>
    <text x="502" y="190" text-anchor="end" class="value">2006 - 2025</text>
    <line x1="28" y1="222" x2="502" y2="222" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <line x1="28" y1="222" x2="502" y2="222" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="502" cy="222" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
    <text x="28" y="254" class="year">2006</text>
    <text x="502" y="254" text-anchor="end" class="year">2025</text>
    <text x="28" y="282" class="hint">Move the end year; the start year follows the 20-year horizon.</text>

    <rect x="28" y="326" width="474" height="112" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="48" y="355" class="label">Historical period: 2006 - 2025</text>
    <text x="48" y="382" class="hint">Every year uses its observed S&amp;P 500 price and dividend return.</text>
    <text x="48" y="407" class="hint">Source: SlickCharts. Completed calendar years only.</text>

    <text x="28" y="482" class="hint">Removed: expected return, dividend yield, crash controls, and re-roll.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="820" viewBox="0 0 1240 820">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #64748b; }
      .panel-title { font: 700 18px Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .value { font: 600 13px Arial, sans-serif; fill: #475569; }
      .hint { font: 400 12px Arial, sans-serif; fill: #94a3b8; }
      .button { font: 600 13px Arial, sans-serif; }
      .year { font: 700 16px Arial, sans-serif; fill: #1e3a8a; }
    </style>
  </defs>

  <rect width="1240" height="820" fill="#f8fafc"/>
  <text x="60" y="58" class="title">Historical return controls</text>
  <text x="60" y="84" class="subtitle">The historical window is locked to the investment horizon and slides by end year.</text>

  <!-- Hybrid panel -->
  <g transform="translate(60 120)" filter="url(#shadow)">
    <rect width="530" height="630" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="28" y="42" class="panel-title">Control Panel</text>
    <line x1="28" y1="58" x2="502" y2="58" stroke="#e2e8f0"/>

    <text x="28" y="96" class="label">Market return model</text>
    <rect x="28" y="110" width="474" height="46" rx="9" fill="#f1f5f9"/>
    <rect x="32" y="114" width="278" height="38" rx="7" fill="#2563eb"/>
    <text x="171" y="138" text-anchor="middle" class="button" fill="#ffffff">Expected + historical low years</text>
    <text x="405" y="138" text-anchor="middle" class="button" fill="#64748b">Full historical replay</text>

    <text x="28" y="197" class="label">Expected annual market return</text>
    <text x="502" y="197" text-anchor="end" class="value">8.0%</text>
    <line x1="28" y1="222" x2="502" y2="222" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <line x1="28" y1="222" x2="222" y2="222" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="222" cy="222" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
    <text x="28" y="249" class="hint">Used when the historical price return is 5% or higher.</text>

    <text x="28" y="301" class="label">Historical period</text>
    <text x="502" y="301" text-anchor="end" class="value">20 years</text>
    <rect x="28" y="317" width="474" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="48" y="345" class="hint">Selected range</text>
    <text x="48" y="372" class="year">2006 - 2025</text>
    <text x="482" y="360" text-anchor="end" class="hint">Latest complete window</text>

    <text x="28" y="429" class="label">Historical end year</text>
    <text x="502" y="429" text-anchor="end" class="value">2025</text>
    <line x1="28" y1="454" x2="502" y2="454" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <line x1="28" y1="454" x2="502" y2="454" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="502" cy="454" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
    <text x="28" y="481" class="hint">Move the window through history; its length remains 20 years.</text>

    <rect x="28" y="520" width="474" height="78" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="49" cy="545" r="8" fill="#f59e0b"/>
    <text x="68" y="550" class="value">Low-return years use their historical price return.</text>
    <text x="68" y="575" class="hint">All other years use the expected 8.0% return.</text>
  </g>

  <!-- Full replay panel -->
  <g transform="translate(650 120)" filter="url(#shadow)">
    <rect width="530" height="630" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="28" y="42" class="panel-title">Control Panel</text>
    <line x1="28" y1="58" x2="502" y2="58" stroke="#e2e8f0"/>

    <text x="28" y="96" class="label">Market return model</text>
    <rect x="28" y="110" width="474" height="46" rx="9" fill="#f1f5f9"/>
    <text x="171" y="138" text-anchor="middle" class="button" fill="#64748b">Expected + historical low years</text>
    <rect x="314" y="114" width="184" height="38" rx="7" fill="#2563eb"/>
    <text x="406" y="138" text-anchor="middle" class="button" fill="#ffffff">Full historical replay</text>

    <rect x="28" y="181" width="474" height="54" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-dasharray="5 4"/>
    <text x="48" y="204" class="hint">Expected annual market return</text>
    <text x="48" y="222" class="hint">Hidden in full replay mode</text>

    <text x="28" y="281" class="label">Historical period</text>
    <text x="502" y="281" text-anchor="end" class="value">20 years</text>
    <rect x="28" y="297" width="474" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="48" y="325" class="hint">Selected range</text>
    <text x="48" y="352" class="year">2006 - 2025</text>
    <text x="482" y="340" text-anchor="end" class="hint">Latest complete window</text>

    <text x="28" y="409" class="label">Historical end year</text>
    <text x="502" y="409" text-anchor="end" class="value">2025</text>
    <line x1="28" y1="434" x2="502" y2="434" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <line x1="28" y1="434" x2="502" y2="434" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="502" cy="434" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
    <text x="28" y="461" class="hint">Changing the horizon keeps this end year when possible.</text>

    <rect x="28" y="500" width="474" height="98" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
    <circle cx="49" cy="526" r="8" fill="#16a34a"/>
    <text x="68" y="531" class="value">Every year uses its historical S&amp;P 500 price return.</text>
    <text x="68" y="556" class="hint">Dividend yield remains a separate input for tax modeling.</text>
    <text x="68" y="579" class="hint">No crash count, severity band, overrides, or re-roll.</text>
  </g>
</svg>
